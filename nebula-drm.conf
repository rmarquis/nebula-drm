# nebula-drm configuration
# Edit this file to set your location and color temperatures.
# Changes take effect on next service start: systemctl restart nebula-drm

# Geographic position in decimal degrees (latitude:longitude)
# Example: 47.37:8.54 for Zurich, Switzerland
NEBULA_LOCATION=0.0:0.0

# Color temperatures in Kelvin (day:night)
# Typical values: 6500K (daylight) / 4500K (warm evening)
NEBULA_TEMP=6500:4500

# Brightness multipliers (day:night), 0.0 to 1.0
NEBULA_BRIGHTNESS=1.0:0.8

# DRM card index to use (leave empty for auto-detect)
# Example: NEBULA_CARD=-d 1
NEBULA_CARD=
